<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>小寶，對不起</title>
<!-- fullscreen-ios-replacement-v2 -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ff5f86" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="小寶" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
:root{--pink:#ff5f86;--pink2:#ffa0ba;--deep:#c94b6b;--text:#5f303d}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;background:linear-gradient(160deg,#ffd6e7,#fff7fb 42%,#ffddeb);color:var(--text);touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
body{display:block;padding:0;background:linear-gradient(160deg,#ffd6e7,#fff7fb 42%,#ffddeb)}
.phone{position:relative;width:100vw;height:100dvh;min-height:100vh;overflow:hidden;border-radius:0;background:radial-gradient(circle at 18% 9%,rgba(255,255,255,.96),transparent 29%),radial-gradient(circle at 90% 15%,rgba(255,170,205,.65),transparent 31%),linear-gradient(180deg,#fffafd,#ffe2ed);border:0;box-shadow:none}
.notch{display:none}
.topbar{position:absolute;top:max(14px, env(safe-area-inset-top));left:16px;right:16px;display:flex;justify-content:space-between;gap:8px;z-index:80;font-size:12px;font-weight:900;color:var(--deep)}
.pill{background:rgba(255,255,255,.75);border:1px solid rgba(255,110,155,.25);border-radius:999px;padding:8px 10px;box-shadow:0 8px 18px rgba(200,60,105,.12);backdrop-filter:blur(10px)}.soundBtn{cursor:pointer;font-family:inherit;color:var(--deep);font-weight:1000}
.screen{position:absolute;inset:0;padding:calc(max(68px, env(safe-area-inset-top) + 56px)) 20px calc(max(24px, env(safe-area-inset-bottom) + 18px));display:none;text-align:center;z-index:10}
.screen.active{display:block;animation:fadeIn .25s ease both}
.title{margin:8px 0 8px;font-size:34px;line-height:1.15;font-weight:1000;color:#ee5f82;text-shadow:0 10px 22px rgba(238,95,130,.22)}
.bigEmoji{font-size:88px;line-height:1;margin:20px 0 10px;animation:pulse 1s infinite;filter:drop-shadow(0 10px 14px rgba(236,93,125,.22))}
.card{background:rgba(255,255,255,.72);border:1px solid rgba(255,120,160,.32);border-radius:34px;padding:22px 18px;box-shadow:0 16px 36px rgba(190,60,105,.15);backdrop-filter:blur(12px)}
.text{font-size:24px;line-height:1.65;font-weight:1000}
.small{font-size:14px;font-weight:900;color:#a94d64;line-height:1.5;margin-top:8px}
.btnRow{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:22px}
.btn{border:0;border-radius:999px;padding:16px 26px;font-size:18px;font-weight:1000;cursor:pointer;font-family:inherit;transition:transform .2s ease,opacity .2s ease}
.primary{color:white;background:linear-gradient(135deg,var(--pink),var(--pink2));box-shadow:0 14px 30px rgba(236,93,125,.38);animation:glow 1.45s infinite}
.secondary{color:#e85d75;background:white;border:2px solid #ffabc1;box-shadow:0 10px 22px rgba(0,0,0,.07)}
.btn:active{transform:scale(.94)}
.gamebox{position:relative;width:100%;height:min(58dvh,560px);margin-top:14px;border-radius:34px;background:rgba(255,255,255,.36);border:1px dashed rgba(236,93,125,.28);overflow:hidden}
.gameHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
.task{font-size:16px;font-weight:1000;line-height:1.45;color:#9f3e58;text-align:left}
.progress{height:14px;flex:1;background:rgba(255,255,255,.7);border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--pink),#ffc0d1);border-radius:999px;transition:width .25s}
.toast{position:absolute;top:88px;left:50%;transform:translateX(-50%);background:white;color:#d94b70;border-radius:999px;padding:10px 16px;font-weight:1000;z-index:120;box-shadow:0 12px 25px rgba(180,60,100,.18);opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{animation:toast 1.05s ease both}
.float{position:absolute;pointer-events:none;z-index:1;animation:rise linear forwards;opacity:.8}
.burst{position:absolute;pointer-events:none;z-index:150;animation:burst 1s ease-out forwards;font-size:26px}
.fail{position:absolute;z-index:130;font-size:48px;animation:fail .75s ease forwards;pointer-events:none}
.shake{animation:shake .34s ease}
.tapTarget,.tapBad{position:absolute;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;background:rgba(255,255,255,.6);box-shadow:0 12px 24px rgba(210,60,110,.14);animation:pop .25s ease both}
.tapTarget{animation:pop .25s ease both,pulse .8s infinite}.tapBad{font-size:38px}
.catchHud{position:absolute;top:10px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;z-index:20;font-size:13px;font-weight:1000;color:#bd4d68}
.catchField{position:absolute;left:0;right:0;top:46px;bottom:98px;overflow:hidden}
.player{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);width:132px;height:82px;border-radius:34px;background:white;border:3px solid #ff9db7;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 14px 28px rgba(0,0,0,.1);z-index:60;cursor:grab;touch-action:none}
.player.good{animation:catchGood .28s ease}.player.bad{animation:catchBad .34s ease}
.faller{position:absolute;top:-70px;width:88px;height:56px;border-radius:22px;background:white;border:2px solid rgba(255,120,160,.35);display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;font-weight:1000;color:#e85d75;box-shadow:0 10px 22px rgba(160,60,100,.13);z-index:12;will-change:transform}
.faller.bad{color:#8b4a58;background:#fff5f7;border-color:rgba(160,60,90,.25)}
.dragHint{position:absolute;bottom:112px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:1000;color:#a85068;background:rgba(255,255,255,.78);border-radius:999px;padding:8px 13px;z-index:65}
.dodgePlayer{position:absolute;bottom:28px;left:50%;transform:translate3d(-50%,0,0);width:88px;height:88px;border-radius:50%;background:white;border:3px solid #ff9db7;display:flex;align-items:center;justify-content:center;font-size:46px;z-index:70;box-shadow:0 14px 28px rgba(0,0,0,.1);cursor:grab;touch-action:none;will-change:left,transform}
.dodgeBad,.dodgeGood{position:absolute;top:-60px;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:31px;background:white;box-shadow:0 10px 22px rgba(0,0,0,.08);z-index:15;will-change:transform}
.noZone{position:absolute;width:128px;height:82px;left:calc(50% - 64px);top:60px;display:flex;align-items:center;justify-content:center;z-index:35;transition:left .25s cubic-bezier(.2,.9,.3,1.25),top .25s cubic-bezier(.2,.9,.3,1.25),opacity .2s}
.noVisual{width:100px;height:54px;border-radius:999px;background:white;border:2px solid #ff9db7;color:#e85d75;font-size:17px;font-weight:1000;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px rgba(0,0,0,.08);pointer-events:none;transition:transform .18s,opacity .18s}
.yesFinal{position:absolute;left:50%;bottom:36px;transform:translateX(-50%);z-index:36}
.modal{position:absolute;inset:0;background:rgba(255,240,248,.88);backdrop-filter:blur(12px);z-index:200;display:none;align-items:center;justify-content:center;padding:22px;text-align:center}
.modal.show{display:flex;animation:fadeIn .25s ease both}
.modalBox{background:white;border-radius:34px;padding:28px 20px;width:100%;box-shadow:0 18px 46px rgba(190,60,105,.22);border:1px solid rgba(255,120,160,.28)}
.modalBox h2{margin:0 0 10px;color:#e85d75;font-size:30px}.modalBox p{font-size:19px;line-height:1.65;font-weight:1000;margin:0}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
@keyframes glow{0%,100%{box-shadow:0 14px 30px rgba(236,93,125,.34)}50%{box-shadow:0 18px 44px rgba(236,93,125,.62)}}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) translateY(-16px) scale(.95)}20%,80%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.96)}}
@keyframes burst{from{opacity:1;transform:translate(0,0) scale(.8) rotate(0)}to{opacity:0;transform:translate(var(--x),var(--y)) scale(1.8) rotate(260deg)}}
@keyframes rise{from{bottom:-35px;opacity:0;transform:rotate(0)}15%{opacity:.85}to{bottom:110%;opacity:0;transform:rotate(360deg)}}
@keyframes fail{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.25)}100%{opacity:0;transform:translateY(-35px) scale(.9)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
@keyframes pop{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
@keyframes catchGood{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.18)}}
@keyframes catchBad{0%,100%{transform:translateX(-50%) rotate(0)}25%{transform:translateX(-50%) rotate(-12deg)}75%{transform:translateX(-50%) rotate(12deg)}}
@media(max-height:740px){.gamebox{height:50dvh}.title{font-size:30px}.bigEmoji{font-size:72px;margin:12px 0 6px}.text{font-size:21px}}
</style>
</head>
<body>
<main class="phone" id="phone">
<div class="notch"></div>
<div class="topbar"><div class="pill">通關：<span id="passCount">0</span></div><div class="pill">小寶分數：<span id="score">0</span></div><button class="pill soundBtn" id="soundBtn" onclick="toggleSound()">🔊</button></div>
<div class="toast" id="toast">小寶 🥺</div>

<section class="screen active" id="home">
  <div class="title">小寶，對不起</div>
  <div class="bigEmoji">🥺</div>
  <div class="card">
    <div class="text">我錯了。<br>我愛妳。<br>可以原諒我嗎？</div>
    <div class="btnRow">
      <button class="btn primary" onclick="success()">原諒你 ❤️</button>
      <button class="btn secondary" onclick="chooseNo()">不要 😤</button>
    </div>
    <div class="small">按「不要」會觸發小任務。</div>
  </div>
</section>

<section class="screen" id="tapGame">
  <div class="title">愛心補救任務</div>
  <div class="gameHeader"><div class="task">點愛心，不要點破碎心。<br>收集 12 顆就完成。</div><div class="progress"><div class="bar" id="tapBar"></div></div></div>
  <div class="gamebox" id="tapBox"></div>
</section>

<section class="screen" id="catchGame">
  <div class="title">接住道歉任務</div>
  <div class="gameHeader"><div class="task">按住籃子左右拖動。<br>接「對不起」，避開「不要」。</div><div class="progress"><div class="bar" id="catchBar"></div></div></div>
  <div class="gamebox" id="catchBox">
    <div class="catchHud"><span>接住：<span id="caught">0</span>/10</span><span>生命：<span id="lives">3</span> ❤️</span></div>
    <div class="catchField" id="catchField"></div>
    <div class="player" id="basket">🧺</div>
    <div class="dragHint">按住籃子左右拖動</div>
  </div>
</section>

<section class="screen" id="dodgeGame">
  <div class="title">躲開不要任務</div>
  <div class="gameHeader"><div class="task">拖動小寶左右移動。<br>吃 6 顆愛心，避開「不要」。</div><div class="progress"><div class="bar" id="dodgeBar"></div></div></div>
  <div class="gamebox" id="dodgeBox">
    <div class="catchHud"><span>時間：<span id="timeLeft">16</span>s</span><span>愛心：<span id="dodgeScore">0</span></span></div>
    <div class="dragHint">拖動小寶左右移動，不用點擊</div>
    <div class="dodgePlayer" id="dodgePlayer">🥺</div>
  </div>
</section>

<section class="screen" id="finalNoGame">
  <div class="title">最後原諒任務</div>
  <div class="card" style="margin-bottom:14px"><div class="text" id="finalMsg">小寶，真的可以原諒我嗎？</div></div>
  <div class="gamebox" id="finalBox">
    <div class="noZone" id="noZone" onclick="pressFinalNo()"><div class="noVisual" id="noVisual">不要 😤</div></div>
    <button class="btn primary yesFinal" id="yesFinal" onclick="success()">原諒你 ❤️</button>
  </div>
</section>

<section class="screen" id="successScreen">
  <div class="title">成功通關 💕</div>
  <div class="bigEmoji">💖</div>
  <div class="card">
    <div class="text">謝謝小寶。<br>我真的很愛妳。<br>以後我會更珍惜妳。</div>
    <div class="btnRow"><button class="btn primary" onclick="heartStorm()">再放一次愛心雨</button></div>
  </div>
</section>

<div class="modal" id="modal">
  <div class="modalBox">
    <h2 id="modalTitle">完成 💕</h2>
    <p id="modalText">小寶太強了。</p>
    <button class="btn primary" style="margin-top:20px" id="modalBtn">繼續 ❤️</button>
  </div>
</div>
</main>

<script>
const phone=document.getElementById("phone");
const toast=document.getElementById("toast");
const scoreEl=document.getElementById("score");
const passEl=document.getElementById("passCount");
let score=0;
let passCount=Number(localStorage.getItem("xiaobao_pass_count")||0);
let noTimes=0;
passEl.textContent=passCount;

/* Sound effects - built with Web Audio, no external files needed */
let audioCtx = null;
let soundOn = localStorage.getItem("xiaobao_sound") !== "off";

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
}

function toggleSound(){
  soundOn = !soundOn;
  localStorage.setItem("xiaobao_sound", soundOn ? "on" : "off");
  $("soundBtn").textContent = soundOn ? "🔊" : "🔇";
  initAudio();
  if(soundOn) playSound("tap");
}

function playTone(freq, duration=0.12, type="sine", volume=0.055, delay=0){
  if(!soundOn) return;
  initAudio();
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(volume, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.03);
}

function playNoise(duration=0.12, volume=0.035){
  if(!soundOn) return;
  initAudio();
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1-i/bufferSize);
  const noise = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  noise.buffer = buffer;
  gain.gain.value = volume;
  noise.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start();
}

function playSound(name){
  if(!soundOn) return;
  if(name==="tap"){ playTone(740,.08,"sine",.045); playTone(980,.08,"sine",.035,.055); }
  if(name==="good"){ playTone(660,.09,"sine",.045); playTone(880,.10,"sine",.045,.07); playTone(1175,.13,"sine",.04,.14); }
  if(name==="bad"){ playTone(220,.12,"triangle",.05); playTone(165,.15,"triangle",.04,.09); }
  if(name==="win"){ playTone(523,.10,"sine",.05); playTone(659,.10,"sine",.05,.09); playTone(784,.10,"sine",.05,.18); playTone(1046,.22,"sine",.045,.28); }
  if(name==="heart"){ playTone(900,.05,"sine",.035); }
  if(name==="pop"){ playNoise(.08,.025); playTone(420,.07,"sine",.025); }
}

document.addEventListener("pointerdown", initAudio, {once:true});
window.addEventListener("load", () => {
  const btn = document.getElementById("soundBtn");
  if(btn) btn.textContent = soundOn ? "🔊" : "🔇";
});


function $(id){return document.getElementById(id)}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active")}
function addScore(n){score+=n;scoreEl.textContent=score}
function showToast(t){toast.textContent=t;toast.classList.remove("show");void toast.offsetWidth;toast.classList.add("show")}
function phonePoint(x,y){const r=phone.getBoundingClientRect();return{x:x-r.left,y:y-r.top}}
function burst(x,y,icons=["💖","💕","💗","🌸","✨","❤️"]){const p=phonePoint(x,y);const b=document.createElement("div");b.className="burst";b.textContent=icons[Math.floor(Math.random()*icons.length)];b.style.left=p.x+"px";b.style.top=p.y+"px";b.style.setProperty("--x",(Math.random()*300-150)+"px");b.style.setProperty("--y",(Math.random()*300-180)+"px");phone.appendChild(b);setTimeout(()=>b.remove(),1000)}
function failAt(x,y){const p=phonePoint(x,y);const f=document.createElement("div");f.className="fail";f.textContent=["😭","💔","🥺","嗚"][Math.floor(Math.random()*4)];f.style.left=p.x+"px";f.style.top=p.y+"px";phone.appendChild(f);phone.classList.remove("shake");void phone.offsetWidth;phone.classList.add("shake");setTimeout(()=>f.remove(),800)}
function modal(title,text,callback){$("modalTitle").textContent=title;$("modalText").innerHTML=text;$("modal").classList.add("show");$("modalBtn").onclick=()=>{$("modal").classList.remove("show");if(callback)callback()}}
function chooseNo(){playSound('bad');noTimes++; if(noTimes===1)startTapGame(); else if(noTimes===2)startCatchGame(); else if(noTimes===3)startDodgeGame(); else startFinalNoGame()}
function success(){
  playSound('win');
  showScreen("successScreen");
  score = 520;
  scoreEl.textContent = score;
  passCount++;
  localStorage.setItem("xiaobao_pass_count", passCount);
  passEl.textContent = passCount;
  heartStorm();
}
function heartStorm(){const r=phone.getBoundingClientRect();for(let i=0;i<130;i++)setTimeout(()=>burst(r.left+Math.random()*phone.clientWidth,r.top+Math.random()*phone.clientHeight),i*12)}
function floaty(){const f=document.createElement("div");f.className="float";f.textContent=["❤️","💕","💗","🌸","✨"][Math.floor(Math.random()*5)];f.style.left=Math.random()*100+"%";f.style.fontSize=(16+Math.random()*24)+"px";f.style.animationDuration=(4+Math.random()*4)+"s";phone.appendChild(f);setTimeout(()=>f.remove(),8500)}
setInterval(floaty,270);

/* Tap game */
let tapActive=false,tapCount=0,tapSpawnTimer=null;
function startTapGame(){tapActive=true;tapCount=0;showScreen("tapGame");$("tapBar").style.width="0%";$("tapBox").innerHTML="";showToast("點愛心補救我 🥺");playSound('pop');spawnTap()}
function spawnTap(){if(!tapActive)return;const box=$("tapBox");const isBad=Math.random()<.28;const item=document.createElement("div");item.className=isBad?"tapBad":"tapTarget";item.textContent=isBad?"💔":["❤️","💖","💕","🌸"][Math.floor(Math.random()*4)];item.style.left=Math.random()*(box.clientWidth-80)+12+"px";item.style.top=Math.random()*(box.clientHeight-95)+12+"px";item.onclick=(e)=>{e.stopPropagation();const r=item.getBoundingClientRect();if(isBad){tapCount=Math.max(0,tapCount-1);playSound('bad');failAt(r.left+30,r.top+30);showToast("那是破碎心啦 😭")}else{tapCount++;addScore(2);playSound('good');burst(r.left+35,r.top+35);showToast(["好耶 ❤️","小寶好強 💕","再一顆 🥺"][Math.floor(Math.random()*3)])}$("tapBar").style.width=Math.min(100,tapCount/12*100)+"%";item.remove();if(tapCount>=12){tapActive=false;clearTimeout(tapSpawnTimer);playSound("win");modal("任務完成 💕","愛心收集成功。<br>可以回去選原諒我了嗎？",()=>showScreen("home"))}};box.appendChild(item);setTimeout(()=>item.remove(),1200);tapSpawnTimer=setTimeout(spawnTap,420)}

/* Catch game - drag basket only */
let catchActive=false,caught=0,lives=3,basketX=0,fallers=[],catchLoopId=null,spawnFallId=null,draggingBasket=false;
function startCatchGame(){showScreen("catchGame");catchActive=true;caught=0;lives=3;fallers=[];draggingBasket=false;$("caught").textContent=0;$("lives").textContent=3;$("catchBar").style.width="0%";$("catchField").innerHTML="";setBasketX($("catchBox").clientWidth/2);showToast("拖動籃子接住對不起 🥺");playSound('pop');spawnFaller();catchLoopId=requestAnimationFrame(catchLoop)}
function setBasketX(x){const box=$("catchBox"),basket=$("basket");basketX=Math.max(66,Math.min(box.clientWidth-66,x));basket.style.left=basketX+"px"}
$("basket").addEventListener("pointerdown",e=>{if(!catchActive)return;draggingBasket=true;$("basket").setPointerCapture(e.pointerId);$("basket").style.cursor="grabbing";e.preventDefault()});
$("basket").addEventListener("pointermove",e=>{if(!catchActive||!draggingBasket)return;const rect=$("catchBox").getBoundingClientRect();setBasketX(e.clientX-rect.left);e.preventDefault()});
$("basket").addEventListener("pointerup",()=>{draggingBasket=false;$("basket").style.cursor="grab"});
$("basket").addEventListener("pointercancel",()=>{draggingBasket=false;$("basket").style.cursor="grab"});
function spawnFaller(){if(!catchActive)return;const field=$("catchField");const bad=Math.random()<.30;const el=document.createElement("div");el.className="faller"+(bad?" bad":"");el.textContent=bad?"不要 💔":"對不起";const x=Math.random()*(field.clientWidth-92)+2;const speed=1.25+Math.random()*0.9+(caught*.04);el.style.left=x+"px";field.appendChild(el);fallers.push({el,x,y:-70,speed,bad,hit:false});spawnFallId=setTimeout(spawnFaller,680)}
function catchLoop(){if(!catchActive)return;const field=$("catchField"),basket=$("basket");const fieldRect=field.getBoundingClientRect();const basketRect=basket.getBoundingClientRect();fallers.forEach(obj=>{if(obj.hit)return;obj.y+=obj.speed*3.4;obj.el.style.transform=`translate3d(0,${obj.y}px,0)`;const r=obj.el.getBoundingClientRect();const overlap=!(r.right<basketRect.left+8||r.left>basketRect.right-8||r.bottom<basketRect.top+8||r.top>basketRect.bottom-4);if(overlap){obj.hit=true;obj.el.remove();if(obj.bad){playSound('bad');lives--;$("lives").textContent=lives;basket.classList.remove("bad");void basket.offsetWidth;basket.classList.add("bad");failAt(basketRect.left+55,basketRect.top+20);showToast("啊！接到不要了 😭");if(lives<=0)endCatch(false)}else{caught++;addScore(3);playSound('good');$("caught").textContent=caught;$("catchBar").style.width=Math.min(100,caught/10*100)+"%";basket.classList.remove("good");void basket.offsetWidth;basket.classList.add("good");burst(basketRect.left+65,basketRect.top+24);showToast("接住了 ❤️");if(caught>=10)endCatch(true)}}else if(r.top>fieldRect.bottom){obj.hit=true;obj.el.remove();if(!obj.bad){playSound('bad');lives--;$("lives").textContent=lives;failAt(r.left+20,fieldRect.bottom-30);showToast("漏掉對不起了 🥺");if(lives<=0)endCatch(false)}}});fallers=fallers.filter(o=>!o.hit);if(catchActive)catchLoopId=requestAnimationFrame(catchLoop)}
function endCatch(win){catchActive=false;clearTimeout(spawnFallId);cancelAnimationFrame(catchLoopId);$("catchField").innerHTML="";if(win){playSound("win");modal("任務完成 💕","妳接住我的對不起了。<br>可以回去選原諒我了嗎？",()=>showScreen("home"))}else{playSound("bad");modal("任務失敗 🥺","差一點點。<br>再陪我試一次好不好？",()=>startCatchGame())}}

/* Dodge game - smooth drag */
let dodgeActive=false,dodgeTimer=null,dodgeLoop=null,dodgeSpawnTimer=null,dodgeTime=16,dodgePoints=0,dodgePlayerX=0,dodgeTargetX=0,dodgeItems=[],draggingDodge=false,lastDodgeHit=0;
function startDodgeGame(){showScreen("dodgeGame");dodgeActive=true;dodgeTime=16;dodgePoints=0;dodgeItems=[];draggingDodge=false;lastDodgeHit=0;$("dodgeScore").textContent=0;$("timeLeft").textContent=16;$("dodgeBar").style.width="0%";[...$("dodgeBox").querySelectorAll(".dodgeBad,.dodgeGood")].forEach(e=>e.remove());setDodgeX($("dodgeBox").clientWidth/2,true);showToast("拖動小寶，躲開不要 ❤️");playSound('pop');dodgeTimer=setInterval(()=>{if(!dodgeActive)return;dodgeTime--;$("timeLeft").textContent=dodgeTime;if(dodgeTime<=0)endDodge(false)},1000);spawnDodge();dodgeLoop=requestAnimationFrame(dodgeStep)}
function setDodgeX(x,instant=false){const box=$("dodgeBox");dodgeTargetX=Math.max(48,Math.min(box.clientWidth-48,x));if(instant)dodgePlayerX=dodgeTargetX}
function updateDodgeVisual(){const p=$("dodgePlayer");dodgePlayerX+=(dodgeTargetX-dodgePlayerX)*0.32;p.style.left=dodgePlayerX+"px"}
$("dodgePlayer").addEventListener("pointerdown",e=>{if(!dodgeActive)return;draggingDodge=true;$("dodgePlayer").setPointerCapture(e.pointerId);$("dodgePlayer").style.cursor="grabbing";const rect=$("dodgeBox").getBoundingClientRect();setDodgeX(e.clientX-rect.left);e.preventDefault()});
$("dodgePlayer").addEventListener("pointermove",e=>{if(!dodgeActive||!draggingDodge)return;const rect=$("dodgeBox").getBoundingClientRect();setDodgeX(e.clientX-rect.left);e.preventDefault()});
$("dodgePlayer").addEventListener("pointerup",()=>{draggingDodge=false;$("dodgePlayer").style.cursor="grab"});
$("dodgePlayer").addEventListener("pointercancel",()=>{draggingDodge=false;$("dodgePlayer").style.cursor="grab"});
function spawnDodge(){if(!dodgeActive)return;const box=$("dodgeBox");const good=Math.random()<.45;const el=document.createElement("div");el.className=good?"dodgeGood":"dodgeBad";el.textContent=good?"❤️":"不要";el.style.left=Math.random()*(box.clientWidth-78)+10+"px";box.appendChild(el);dodgeItems.push({el,y:-72,speed:1.15+Math.random()*0.85,good,hit:false});dodgeSpawnTimer=setTimeout(spawnDodge,good?760:900)}
function dodgeStep(){if(!dodgeActive)return;updateDodgeVisual();const box=$("dodgeBox"),p=$("dodgePlayer"),pr=p.getBoundingClientRect(),br=box.getBoundingClientRect(),now=Date.now();const ph={left:pr.left+18,right:pr.right-18,top:pr.top+18,bottom:pr.bottom-12};dodgeItems.forEach(o=>{if(o.hit)return;o.y+=o.speed*3.2;o.el.style.transform=`translate3d(0,${o.y}px,0)`;const r=o.el.getBoundingClientRect();const ih={left:r.left+8,right:r.right-8,top:r.top+8,bottom:r.bottom-8};const overlap=!(ih.right<ph.left||ih.left>ph.right||ih.bottom<ph.top||ih.top>ph.bottom);if(overlap){o.hit=true;o.el.remove();if(o.good){dodgePoints++;addScore(2);playSound('good');$("dodgeScore").textContent=dodgePoints;$("dodgeBar").style.width=Math.min(100,dodgePoints/6*100)+"%";burst(pr.left+44,pr.top+28);showToast("吃到愛心 ❤️");if(dodgePoints>=6)endDodge(true)}else if(now-lastDodgeHit>900){playSound('bad');lastDodgeHit=now;dodgeTime=Math.max(4,dodgeTime-2);$("timeLeft").textContent=dodgeTime;failAt(pr.left+36,pr.top+28);showToast("撞到不要，扣 2 秒 🥺")}}else if(r.top>br.bottom){o.hit=true;o.el.remove()}});dodgeItems=dodgeItems.filter(o=>!o.hit);if(dodgeActive)dodgeLoop=requestAnimationFrame(dodgeStep)}
function endDodge(forceWin=false){if(!dodgeActive)return;const win=forceWin||dodgePoints>=6;dodgeActive=false;clearInterval(dodgeTimer);clearTimeout(dodgeSpawnTimer);cancelAnimationFrame(dodgeLoop);[...$("dodgeBox").querySelectorAll(".dodgeBad,.dodgeGood")].forEach(e=>e.remove());if(win){playSound("win");modal("任務完成 💕","小寶成功躲開不要。<br>可以回去選原諒我了嗎？",()=>showScreen("home"))}else{playSound("bad");modal("差一點 🥺","差一點點。<br>再陪我試一次好不好？",()=>startDodgeGame())}}

/* Final no game */
let finalNoCount=0;
function startFinalNoGame(){showScreen("finalNoGame");finalNoCount=0;$("noZone").style.opacity="1";$("noZone").style.pointerEvents="auto";$("noZone").style.left="calc(50% - 64px)";$("noZone").style.top="60px";$("noVisual").style.transform="scale(1)";$("noVisual").style.opacity="1";$("noVisual").textContent="不要 😤";$("yesFinal").style.transform="translateX(-50%) scale(1)";$("finalMsg").innerHTML="小寶，真的可以原諒我嗎？"}
function pressFinalNo(){playSound('bad');finalNoCount++;const box=$("finalBox"),zone=$("noZone"),vis=$("noVisual"),yes=$("yesFinal");const msgs=["拜託嘛 🥺","再給我一次機會 😭","不要按不要啦 💔","小寶我真的錯了","最後一次拜託妳 ❤️","現在只能原諒我了 💕"];$("finalMsg").innerHTML=msgs[Math.min(finalNoCount-1,msgs.length-1)];const zr=zone.getBoundingClientRect();failAt(zr.left+40,zr.top+25);for(let i=0;i<10;i++)burst(zr.left+40,zr.top+30,["😭","💔","🥺"]);const scale=Math.max(.1,1-finalNoCount*.15);vis.style.transform=`scale(${scale}) rotate(${finalNoCount%2?9:-9}deg)`;vis.style.opacity=Math.max(.15,1-finalNoCount*.11);zone.style.width=Math.min(240,128+finalNoCount*20)+"px";zone.style.height=Math.min(170,82+finalNoCount*12)+"px";zone.style.left=Math.random()*(box.clientWidth-zone.offsetWidth-10)+5+"px";zone.style.top=Math.random()*(box.clientHeight-zone.offsetHeight-120)+8+"px";yes.style.transform=`translateX(-50%) scale(${Math.min(1.85,1+finalNoCount*.12)})`;if(finalNoCount>=7){vis.textContent="按不到";showToast("不要鍵壞掉了，只能原諒 ❤️")}if(finalNoCount>=9){zone.style.pointerEvents="none";zone.style.opacity="0";$("finalMsg").innerHTML="小寶，原諒我好不好？❤️"}}


if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
